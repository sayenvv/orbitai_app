[project]
name = "clovai-apps"
version = "0.1.0"
description = "Shared Clovai app catalog, constants, and app-specific backend logic"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.6.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.24.0",
  "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["clovai_apps"]

[tool.ruff]
line-length = 100
target-version = "py311"
