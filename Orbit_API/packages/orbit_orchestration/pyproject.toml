[project]
name = "orbit-orchestration"
version = "0.1.0"
description = "Multi-agent orchestration (LangGraph + LangChain)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "langchain-core>=0.3.0",
  "langchain-openai>=0.3.0",
  "langgraph>=0.2.0",
  "httpx>=0.28.0",
  "ddgs>=7.0.0",
  "pydantic>=2.9.0",
  "pydantic-settings>=2.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orbit_orchestration"]
