[project]
name = "orbit-orchestration"
version = "0.1.0"
description = "Multi-agent orchestration (AutoGen group chat + LangChain agents)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "langchain-core>=0.3.0",
  "langchain-openai>=0.3.0",
  "autogen-agentchat>=0.4.9",
  "autogen-ext[openai]>=0.4.9",
  "pydantic>=2.9.0",
  "pydantic-settings>=2.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orbit_orchestration"]
